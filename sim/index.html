<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>The Sim</title>
<link rel="manifest" href="manifest.json">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--sur:#141414;--bdr:#252525;
  --txt:#d0d0d0;--dim:#5a5a5a;--acc:#c8a96e;
  --crit:#c0392b;--low:#e67e22;--norm:#4a7a4a;--hi:#27ae60;
  --pos:#2ecc71;--neg:#e74c3c;--neu:#7f8c8d;
  --f:'IBM Plex Mono','Courier New',monospace;
  --fs:system-ui,-apple-system,sans-serif;
}
body{background:var(--bg);color:var(--txt);font-family:var(--f);font-size:16px;line-height:1.6;
  height:100dvh;display:grid;
  grid-template-columns:230px 1fr 210px;
  grid-template-rows:auto 1fr auto;overflow:hidden}

/* HEADER */
header{grid-column:1/-1;padding:7px 14px;border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;gap:12px;background:var(--sur)}
.htitle{font-size:12px;color:var(--dim);letter-spacing:.12em;text-transform:uppercase}
#h-time{font-size:12px;color:var(--dim)}
#h-cash{margin-left:auto;font-size:16px;color:var(--acc)}
.btn{padding:6px 12px;font-family:var(--f);font-size:12px;cursor:pointer;border-radius:2px;border:1px solid var(--bdr);background:transparent;color:var(--txt);user-select:none}
.btn-pri{background:var(--acc);color:#0a0a0a;border-color:var(--acc);font-weight:700}

/* LEFT */
#left-panel{padding:10px;border-right:1px solid var(--bdr);overflow-y:auto}
.tabs{display:flex;border-bottom:1px solid var(--bdr);margin-bottom:8px}
.tab{flex:1;padding:6px 0;font-size:12px;text-align:center;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent}
.tab.on{color:var(--acc);border-color:var(--acc)}
.panel-section{display:none}.panel-section.on{display:block}

/* STATS */
.stat-row{display:flex;align-items:center;gap:5px;margin-bottom:5px;font-size:13px}
.si{width:13px;text-align:center;color:var(--dim)}
.sl{width:58px;color:var(--dim)}
.sbt{flex:1;height:4px;background:var(--bdr);border-radius:2px;overflow:hidden}
.sbf{height:100%;border-radius:2px;transition:width .3s}
.sc-crit{background:var(--crit)}.sc-low{background:var(--low)}
.sc-norm{background:var(--norm)}.sc-high{background:var(--hi)}
.sv{width:26px;text-align:right}
.stat-cash{color:var(--acc);margin-bottom:10px;font-size:14px}

/* JOB */
.job-entry{font-size:13px;line-height:2}
.j-emp{font-weight:700}.j-flags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.jflag{font-size:9px;padding:1px 4px;background:#3a1a1a;color:var(--neg);border-radius:2px}

/* POSSESSIONS */
.psub{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin:8px 0 4px}
.irrev{font-size:11px;padding:2px 0;border-bottom:1px solid var(--bdr);color:var(--low)}
.poss{font-size:11px;padding:2px 0}.pnote{color:var(--dim)}

/* CENTER */
main{display:flex;flex-direction:column;overflow:hidden}
#feed{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:18px}
.narration-entry{border-left:2px solid var(--bdr);padding-left:10px}
.turn-anchor{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;display:flex;gap:8px}
.ta-num{color:var(--acc)}.ta-loc{margin-left:auto}
.narration-prose{font-family:var(--fs);font-size:16px;line-height:1.85;color:var(--txt)}
#input-area{padding:10px 14px;border-top:1px solid var(--bdr);display:flex;gap:8px;background:var(--sur)}
#action-input{flex:1;background:var(--bg);border:1px solid var(--bdr);color:var(--txt);
  font-family:var(--f);font-size:15px;padding:8px 10px;border-radius:2px;
  outline:none;resize:none;min-height:44px;max-height:120px}
#action-input:focus{border-color:var(--acc)}
#submit-btn{background:var(--acc);color:#0a0a0a;border:none;padding:8px 16px;
  font-family:var(--f);font-size:14px;font-weight:700;cursor:pointer;border-radius:2px;align-self:flex-end}
#submit-btn:disabled{opacity:.4;cursor:not-allowed}

/* RIGHT — NPCs */
#npc-panel{padding:10px;border-left:1px solid var(--bdr);overflow-y:auto}
.npc-card{border:1px solid var(--bdr);margin-bottom:10px;padding:7px;border-radius:2px}
.npc-hdr{display:flex;align-items:baseline;flex-wrap:wrap;gap:5px;margin-bottom:5px}
.npc-name{font-size:14px;font-weight:700}.npc-age,.npc-cls{font-size:12px;color:var(--dim)}
.npc-cls{margin-left:auto}
.npc-task{font-size:11px;padding:2px 6px;border-radius:2px;width:100%;margin-top:2px}
.npc-task.avail{background:#1a3a1a;color:var(--pos)}.npc-task.busy{background:#3a1a1a;color:var(--neg)}
.npc-meters{margin-bottom:5px}
.m-row{display:flex;align-items:center;gap:5px;font-size:12px;margin-bottom:3px}
.m-row>span:first-child{width:30px;color:var(--dim)}
.mt{flex:1;height:4px;background:var(--bdr);border-radius:2px;overflow:hidden}
.mf{height:100%;border-radius:2px}
.mp{background:var(--pos)}.mn{background:var(--neg)}.mz{background:var(--neu)}
.mv{width:24px;text-align:right;color:var(--dim)}
.npc-traits{margin-bottom:5px}
.tr-row{display:flex;align-items:center;gap:4px;margin-bottom:2px;font-size:12px}
.tr-k{width:68px;color:var(--dim)}
.tr-t{flex:1;height:3px;background:var(--bdr);border-radius:1px;overflow:hidden}
.tr-f{height:100%;background:var(--acc);border-radius:1px}
.npc-recent{font-size:12px;color:var(--dim);list-style:none;margin-bottom:4px}
.npc-recent li::before{content:'· '}
.npc-flags{display:flex;flex-wrap:wrap;gap:3px}
.nflag{font-size:11px;padding:2px 6px;background:var(--sur);border:1px solid var(--bdr);border-radius:2px;color:var(--dim)}

/* STATUS */
#status-bar{grid-column:1/-1;padding:4px 14px;background:var(--sur);border-top:1px solid var(--bdr);font-size:12px;color:var(--dim)}
.s-err{color:var(--crit)}.s-load{color:var(--acc)}

.empty{color:var(--dim);font-size:13px}
.pnl-label{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}

/* SETTINGS MODAL */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:99;align-items:center;justify-content:center}
#modal.open{display:flex}
.mbox{background:var(--sur);border:1px solid var(--bdr);padding:18px;width:380px;max-height:85vh;overflow-y:auto;border-radius:4px}
.mtitle{font-size:13px;margin-bottom:14px}
.mrow{margin-bottom:11px}
.mlabel{font-size:10px;color:var(--dim);display:block;margin-bottom:3px}
.minput{width:100%;background:var(--bg);border:1px solid var(--bdr);color:var(--txt);
  font-family:var(--f);font-size:12px;padding:5px 7px;border-radius:2px}
.pw-wrapper{position:relative}
.pw-toggle{position:absolute;right:8px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--dim);font-size:14px;background:none;border:none;padding:0}
.pw-toggle:hover{color:var(--acc)}
.mactions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.mactions .btn{color:var(--txt)!important;background:transparent;border:1px solid var(--bdr)}
.mactions .btn-pri{color:#0a0a0a!important;background:var(--acc);border-color:var(--acc);font-weight:700}
.mactions .btn:hover,.mactions .btn-pri:hover{opacity:.85}

@media(max-width:768px){
  body{grid-template-columns:1fr;grid-template-rows:auto 1fr auto auto}
  #left-panel,#npc-panel{display:none}
  #left-panel.mobile-open,#npc-panel.mobile-open{display:block;position:fixed;inset:0;z-index:50;background:var(--bg);padding:20px;overflow-y:auto}
  header{padding:10px 16px}
  #h-cash{font-size:14px}
  .btn{padding:8px 12px;font-size:12px}
  .mobile-only{display:inline-block}
  #feed{padding:16px}
  .narration-prose{font-size:15px}
  #input-area{padding:12px 16px}
  #action-input{font-size:16px;min-height:48px}
  #submit-btn{padding:10px 18px;font-size:14px}
  #status-bar{padding:6px 16px;font-size:11px}
}
.mobile-only{display:none}
.log-entry{font-size:11px;padding:5px 0;border-bottom:1px solid var(--bdr);cursor:pointer;color:var(--dim);display:flex;gap:6px;align-items:baseline;line-height:1.4}
.log-entry:hover{color:var(--acc)}
.log-turn{color:var(--acc);min-width:28px;flex-shrink:0;font-size:10px}
.log-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
</style>
</head>
<body>

<header>
  <span class="htitle">THE SIM</span>
  <span id="h-time"></span>
  <span id="h-cash">₱0</span>
  <button class="btn mobile-only" id="btn-stats">📊 Stats</button>
  <button class="btn mobile-only" id="btn-npcs">👥 People</button>
  <button class="btn" id="btn-settings">⚙ Settings</button>
  <button class="btn" id="btn-load">↻ Load</button>
  <button class="btn" id="btn-new">+ New Game</button>
</header>

<aside id="left-panel">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div class="tabs">
      <div class="tab on" data-p="stats">Stats</div>
      <div class="tab" data-p="job">Job</div>
      <div class="tab" data-p="items">Items</div>
      <div class="tab" data-p="log">Log</div>
    </div>
    <button class="btn mobile-only" id="btn-close-stats">✕</button>
  </div>
  <div id="p-stats" class="panel-section on"></div>
  <div id="p-job"   class="panel-section"></div>
  <div id="p-items" class="panel-section"></div>
  <div id="p-log"   class="panel-section"></div>
</aside>

<main>
  <div id="feed">
    <div style="color:var(--dim);font-size:12px;padding:24px;text-align:center">
      Start a new game or click Load to restore a save.
    </div>
  </div>
  <div id="input-area">
    <textarea id="action-input" placeholder="What do you do?" rows="1"></textarea>
    <button id="submit-btn">Act</button>
  </div>
</main>

<aside id="npc-panel">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div class="pnl-label">People</div>
    <button class="btn mobile-only" id="btn-close-npcs">✕</button>
  </div>
  <div id="npc-cards"></div>
</aside>

<div id="status-bar"><span id="status"></span></div>

<div id="modal">
  <div class="mbox">
    <div class="mtitle">API Keys</div>
    <div class="mrow"><label class="mlabel">Grok API Key</label><div class="pw-wrapper"><input class="minput" id="k-grok" type="password" placeholder="xai-..." style="padding-right:32px"><button class="pw-toggle" data-target="k-grok">👁</button></div></div>
    <div class="mrow"><label class="mlabel">Gemini API Key</label><div class="pw-wrapper"><input class="minput" id="k-gem" type="password" placeholder="AIza..." style="padding-right:32px"><button class="pw-toggle" data-target="k-gem">👁</button></div></div>
    <div class="mrow"><label class="mlabel">OpenRouter (fallback)</label><div class="pw-wrapper"><input class="minput" id="k-or" type="password" placeholder="sk-or-..." style="padding-right:32px"><button class="pw-toggle" data-target="k-or">👁</button></div></div>
    <div class="mrow"><label class="mlabel">Groq (Gemini fallback)</label><div class="pw-wrapper"><input class="minput" id="k-groq" type="password" placeholder="gsk_..." style="padding-right:32px"><button class="pw-toggle" data-target="k-groq">👁</button></div></div>
    <hr style="border-color:var(--bdr);margin:10px 0">
    <div class="mrow"><label class="mlabel">Lorebook — world &amp; character facts sent in every Grok prompt</label><textarea class="minput" id="k-lorebook" rows="6" style="resize:vertical;min-height:80px" placeholder="e.g. The player's name is Rico Diaz, age 18, male. He lives alone in a small apartment in Cavite, Philippines. He has no established romantic relationships..."></textarea></div>
    <hr style="border-color:var(--bdr);margin:10px 0">
    <div class="mrow"><label class="mlabel">Supabase URL</label><input class="minput" id="k-sb-url" placeholder="https://xxx.supabase.co"></div>
    <div class="mrow"><label class="mlabel">Supabase Anon Key</label><div class="pw-wrapper"><input class="minput" id="k-sb-key" type="password" placeholder="eyJ..." style="padding-right:32px"><button class="pw-toggle" data-target="k-sb-key">👁</button></div></div>
    <div class="mrow"><label class="mlabel">Email (cross-device sync login)</label><input class="minput" id="k-email" type="email" placeholder="you@email.com"><button class="btn" id="btn-login-link" style="margin-top:5px;width:100%">Send Login Link →</button><div id="auth-status" style="font-size:10px;color:var(--dim);margin-top:4px"></div></div>
    <div class="mactions">
      <button class="btn" id="btn-mcancel">Cancel</button>
      <button class="btn btn-pri" id="btn-msave">Save</button>
    </div>
  </div>
</div>

<div id="load-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:99;align-items:center;justify-content:center">
  <div class="mbox" style="width:420px">
    <div class="mtitle">Load Save</div>
    <div id="load-status" style="font-size:11px;color:var(--dim);margin-bottom:10px"></div>
    <div id="save-list" style="max-height:200px;overflow-y:auto;margin-bottom:10px"></div>
    <div class="mactions">
      <button class="btn" id="btn-load-cancel">Cancel</button>
      <button class="btn btn-pri" id="btn-load-confirm">Load Selected</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script type="module">
import { loadWorldState, saveWorldState, resetWorldState, createInitialWorldState,
         assembleTurnBrief, appendSignificantEvent, updateEventIndex, logEvent,
         saveNarration, loadNarrations, savePlayerAction, loadPlayerActions,
         setSupabaseClient, saveWorldStateCloud, loadWorldStateCloud } from './state.js';
import { applyDecay, applyDeltas, advanceTime, formatTimestamp,
         rollRisk, classifyTurn, advanceConsequences, TURN_CLASSIFICATION } from './engine.js';
import { routeInput, isExplicit, classifyExplicitActivity,
         EXPLICIT_ACTIVITY_TABLE, sanitizeStateForGemini, extractCompoundContext, ROUTE } from './sanitizer.js';
import { callGrok, classifyAction, evaluateNpcReaction, resetConvId, setConversationHistory,
         callGeminiAutopilot, compressSessionContext } from './api.js';
import { renderStatPanel, renderNpcPanel, renderJobPanel,
         renderPossessionsPanel, renderNarration, renderTurnAnchor } from './renderer.js';
import { checkWorldEvents, applyEventEffect } from './events.js';
import { tickFlagDecay, addFlag, incrementSignificance, FLAG_DECAY,
         buildNpcContextForGemini, applyRelationshipDelta } from './npc.js';

let WS = null;
let _sbClient = null;

async function renderActionLog() {
  const container = document.getElementById('p-log');
  if (!container) return;
  container.innerHTML = '';
  try {
    const actions = await loadPlayerActions(100);
    if (!actions.length) { container.innerHTML = '<p class="empty">No actions yet.</p>'; return; }
    for (const a of actions) {
      const el = document.createElement('div');
      el.className = 'log-entry';
      el.innerHTML = `<span class="log-turn">T${a.turn}</span><span class="log-text">${a.input.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>`;
      el.addEventListener('click', () => {
        const target = document.querySelector(`.narration-entry[data-turn="${a.turn}"]`);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        else setStatus(`Turn ${a.turn} not loaded in feed.`);
      });
      container.appendChild(el);
    }
  } catch(e) {
    container.innerHTML = '<p class="empty">Log unavailable.</p>';
  }
}

function setStatus(msg, type='') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = type === 'err' ? 's-err' : type === 'load' ? 's-load' : '';
}

function renderAll() {
  if (!WS) return;
  renderStatPanel(WS.player.stats, WS.player.cash, document.getElementById('p-stats'));
  renderNpcPanel(WS.npcs, document.getElementById('npc-cards'), WS.sim_time);
  renderJobPanel(WS.job, document.getElementById('p-job'));
  renderPossessionsPanel(WS.player.possessions, WS.player.irreversible, document.getElementById('p-items'));
  const ts = formatTimestamp(WS.sim_time);
  document.getElementById('h-time').textContent = `${ts.time} · ${ts.day}`;
  document.getElementById('h-cash').textContent = `₱${WS.player.cash.toLocaleString()}`;
}

function lockInput(locked) {
  document.getElementById('action-input').disabled = locked;
  document.getElementById('submit-btn').disabled   = locked;
}

function autopilotHours(input) {
  if (/sleep|nap/i.test(input))         return 7;
  if (/commute/i.test(input))           return 1;
  if (/shift|work\s*day/i.test(input))  return 8;
  return 1;
}

function autopilotDeltas(input, hours) {
  if (/sleep|nap/i.test(input)) {
    return { energy: Math.min(hours * 8, 80), mood: Math.min(hours * 3, 30), hunger: hours * 0.3 };
  }
  return { energy: -(hours * 4), hunger: hours * 0.5 };
}

async function processTurn(input) {
  if (!WS) { alert('Start a new game first.'); return; }
  setStatus('Processing…', 'load');
  lockInput(true);

  try {
    let ws              = JSON.parse(JSON.stringify(WS));
    let statDeltas      = {};
    let relDeltas       = {};
    let timeCost        = 0.25;
    let locationChange  = null;
    let npcReactions    = [];
    let riskResult      = { roll: 100, severity: null, event: null };
    let consequenceUpd  = null;
    let actionDesc      = input;
    const route         = routeInput(input);

    // ── PATH 1: Explicit ─────────────────────────────────────────────────────
    if (route === ROUTE.PATH_1_EXPLICIT) {
      let type = classifyExplicitActivity(input);
      const NEEDS_PARTNER = ['intercourse', 'oral_giving', 'oral_receiving', 'manual_giving', 'manual_receiving', 'mutual_masturbation'];
      const hasActiveNpc  = Object.values(ws.npcs).some(n => n.status === 'active' && n.significance >= 1);
      const forcedSolo    = NEEDS_PARTNER.includes(type) && !hasActiveNpc;
      if (forcedSolo) type = 'solo_masturbation';
      // Spread so we don't mutate the source table
      statDeltas = { ...(EXPLICIT_ACTIVITY_TABLE[type] ?? {}) };
      // Compound: extract eating and location hints from the raw player input
      const compound = extractCompoundContext(input);
      if (compound.ate) {
        statDeltas.hunger = (statDeltas.hunger ?? 0) - 30; // reduce hunger (0=full, 100=starving)
        statDeltas.mood   = (statDeltas.mood   ?? 0) + 5;
      }
      if (compound.location_hint) locationChange = compound.location_hint;
      timeCost   = 0.5;
      actionDesc = (forcedSolo
        ? `[explicit: solo_masturbation — no established partner]`
        : `[explicit: ${type}]`) + (compound.ate ? ' + ate' : '');
      riskResult = rollRisk('low', ws.player.stats);
    }
    // ── PATH 2: Novel ─────────────────────────────────────────────────────────
    else if (route === ROUTE.PATH_2_NOVEL) {
      const safe = sanitizeStateForGemini(ws);
      const cls  = await classifyAction(input, safe);
      statDeltas     = cls.stat_deltas     ?? {};
      timeCost       = cls.time_cost_hours ?? 0.5;
      locationChange = cls.location_change ?? null;
      actionDesc     = `[${cls.action_type ?? 'action'}]`;
      riskResult     = rollRisk(cls.risk_class ?? 'none', ws.player.stats);

      // NPC reactions for involved NPCs
      for (const npcId of (cls.npc_ids_involved ?? [])) {
        if (!ws.npcs[npcId]) continue;
        const ctx = buildNpcContextForGemini(ws.npcs[npcId], ws.sim_time);
        const rxn = await evaluateNpcReaction(ctx, input, ws.player.stats).catch(() => null);
        if (!rxn) continue;
        ws.npcs[npcId] = applyRelationshipDelta(ws.npcs[npcId], rxn.relationship_delta ?? 0, rxn.trust_delta ?? null);
        for (const f of rxn.flags_to_add ?? []) {
          ws.npcs[npcId] = addFlag(ws.npcs[npcId], f.flag, FLAG_DECAY[f.decay_rate] ?? FLAG_DECAY.medium);
        }
        ws.npcs[npcId] = incrementSignificance(ws.npcs[npcId]);
        relDeltas[npcId] = rxn.relationship_delta ?? 0;
        npcReactions.push({ npc_id: npcId, summary: rxn.reaction_summary });
      }
    }
    // ── PATH 3: Autopilot ─────────────────────────────────────────────────────
    else {
      timeCost   = autopilotHours(input);
      statDeltas = autopilotDeltas(input, timeCost);
      actionDesc = '[autopilot]';
    }

    // ── Apply time + stats ────────────────────────────────────────────────────
    ws.sim_time         = advanceTime(ws.sim_time, timeCost).toISOString();
    ws.player.stats     = applyDecay(ws.player.stats, timeCost);
    ws.player.stats     = applyDeltas(ws.player.stats, statDeltas);
    if (locationChange) ws.player.location = locationChange;

    // ── World events ──────────────────────────────────────────────────────────
    for (const ev of checkWorldEvents(ws)) {
      ws = applyEventEffect(ws, ev);
      await logEvent({ turn: ws.turn, category: ev.category, description: ev.label });
      const indexKey = `last_${ev.category}`;
      ws = updateEventIndex(ws, indexKey, ev.label, ws.turn);
    }

    // ── Consequences ──────────────────────────────────────────────────────────
    ws.consequences = advanceConsequences(ws.consequences);
    if (ws.consequences.length) consequenceUpd = ws.consequences[0];

    // ── Turn classification ───────────────────────────────────────────────────
    const turnClass = classifyTurn({
      stats: ws.player.stats, riskResult,
      consequenceSeverity: ws.consequences[0]?.severity,
      statDeltas, relationshipDeltas: relDeltas,
    });

    // ── Tick NPC flag decay ───────────────────────────────────────────────────
    for (const id of Object.keys(ws.npcs)) ws.npcs[id] = tickFlagDecay(ws.npcs[id]);

    ws.turn += 1;

    // ── Narration ─────────────────────────────────────────────────────────────
    let prose = '';

    if (route === ROUTE.PATH_3_AUTOPILOT && turnClass === TURN_CLASSIFICATION.ROUTINE) {
      // Gemini handles mundane autopilot with style guide (Fix #3)
      const safe = sanitizeStateForGemini(ws);
      prose = await callGeminiAutopilot(safe, timeCost, input).catch(() => `${timeCost}h passed.`);
    } else {
      const brief = assembleTurnBrief(ws, {
        turnNumber: ws.turn, simTime: ws.sim_time,
        location: ws.player.location, actionDescription: actionDesc,
        statDeltas, riskResult, consequenceUpdate: consequenceUpd,
        npcReactions, turnClass, isExplicit: route === ROUTE.PATH_1_EXPLICIT,
        rawInput: input,
      });
      const mode = {
        [TURN_CLASSIFICATION.ROUTINE]: 'notable',
        [TURN_CLASSIFICATION.NOTABLE]: 'notable',
        [TURN_CLASSIFICATION.CRISIS]:  'crisis',
        [TURN_CLASSIFICATION.DEATH]:   'death',
      }[turnClass] ?? 'notable';
      prose = await callGrok(brief, mode);
    }

    // ── Significant event log ─────────────────────────────────────────────────
    if (turnClass !== TURN_CLASSIFICATION.ROUTINE) {
      ws = appendSignificantEvent(ws, `Turn ${ws.turn}: ${actionDesc}`);
    }

    // ── Optional session flavor every 10 turns (Fix #1: flavor only) ──────────
    if (ws.turn % 10 === 0 && ws.recent_significant_events.length) {
      ws.session_context_flavor = await compressSessionContext(ws.recent_significant_events).catch(() => '');
    }

    // ── Render + save ─────────────────────────────────────────────────────────
    ws.last_narration_prose = prose;
    const anchor = renderTurnAnchor(ws.turn, ws.sim_time, ws.player.location);
    renderNarration(prose, anchor, document.getElementById('feed'), ws.turn);
    document.getElementById('feed').lastElementChild?.scrollIntoView({ behavior: 'smooth' });
    WS = ws;
    await saveWorldState(ws);
    await saveNarration(ws.turn, ws.sim_time, ws.player.location, prose);
    await savePlayerAction(ws.turn, ws.sim_time, input);
    saveWorldStateCloud(ws).catch(() => {});   // fire-and-forget cloud sync
    renderAll();
    setStatus(`Turn ${ws.turn} · ${formatTimestamp(ws.sim_time).time}`);

    if (turnClass === TURN_CLASSIFICATION.DEATH) {
      setStatus('☠ Character has died.', 'err');
      lockInput(true);
    }
  } catch (err) {
    setStatus(`Error: ${err.message}`, 'err');
    console.error('[processTurn]', err);
    lockInput(false);
  } finally {
    if (WS?.player?.stats?.health > 0) lockInput(false);
  }
}

// ── BOOT ────────────────────────────────────────────────────────────────────
async function boot() {
  const sbUrl = localStorage.getItem('SUPABASE_URL');
  const sbKey = localStorage.getItem('SUPABASE_ANON_KEY');
  let signedIn = false;
  if (sbUrl && sbKey && window.supabase) {
    if (!_sbClient) {
      _sbClient = window.supabase.createClient(sbUrl, sbKey);
      setSupabaseClient(_sbClient);
    }
    await _sbClient.auth.getSession();
    window.history.replaceState(null, '', window.location.pathname);
    const { data: { user } } = await _sbClient.auth.getUser();
    if (user) { signedIn = true; setStatus(`Signed in: ${user.email}`); }
  }
  WS = (await loadWorldStateCloud()) ?? (await loadWorldState());
  if (WS) {
    renderAll();
    try {
      const saved = await loadNarrations(50);
      if (saved.length) {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        for (const n of saved) {
          const anch = renderTurnAnchor(n.turn, n.data?.simTime ?? n.timestamp, n.data?.location ?? '');
          renderNarration(n.description, anch, feed, n.turn);
        }
        feed.scrollTop = feed.scrollHeight;
        // Rebuild Grok conversation history from last 3 narrations for continuity
        const recent = saved.slice(-3);
        const history = [];
        for (const n of recent) {
          history.push({ role: 'user',      content: `[turn ${n.turn} context restored]` });
          history.push({ role: 'assistant', content: n.description });
        }
        setConversationHistory(history);
        if (!signedIn) setStatus(`Save loaded — Turn ${WS.turn} · ${WS.player.name}`);
      } else {
        if (!signedIn) setStatus(`Save loaded — Turn ${WS.turn} · ${WS.player.name} (no narrations)`);
      }
    } catch(e) {
      console.warn('[boot] narration restore failed:', e.message);
      if (!signedIn) setStatus(`Save loaded — Turn ${WS.turn} · ${WS.player.name} (narrations error)`);
    }
  }
  else if (!signedIn) setStatus('Ready.');
}

document.getElementById('btn-new').addEventListener('click', async () => {
  const name = prompt('Character name:');
  if (!name) return;
  if (!confirm(`Start new game as "${name.trim()}"? This will erase the current save.`)) return;
  await resetWorldState();
  WS = createInitialWorldState(name.trim(), new Date().toISOString());
  await saveWorldState(WS);
  document.getElementById('feed').innerHTML = '<div style="color:var(--dim);font-size:12px;padding:24px;text-align:center">New game started. What do you do?</div>';
  renderAll();
  setStatus(`New game — ${name.trim()}`);
  resetConvId();
});

document.getElementById('btn-load').addEventListener('click', async () => {
  const modal = document.getElementById('load-modal');
  const statusEl = document.getElementById('load-status');
  const listEl = document.getElementById('save-list');
  listEl.innerHTML = '';
  statusEl.textContent = 'Checking for saves...';
  modal.style.display = 'flex';

  try {
    // Check local storage save
    const localSave = await loadWorldState();
    const cloudSave = await loadWorldStateCloud();

    let html = '';
    if (localSave) {
      const d = new Date(localSave.sim_time);
      html += `<div class="log-entry" data-source="local">
        <span class="log-turn">LOCAL</span>
        <span class="log-text">${localSave.player.name} — Turn ${localSave.turn} — ${d.toLocaleDateString()}</span>
      </div>`;
    }
    if (cloudSave && (!localSave || cloudSave.turn !== localSave.turn)) {
      const d = new Date(cloudSave.sim_time);
      html += `<div class="log-entry" data-source="cloud">
        <span class="log-turn">CLOUD</span>
        <span class="log-text">${cloudSave.player.name} — Turn ${cloudSave.turn} — ${d.toLocaleDateString()}</span>
      </div>`;
    }
    if (!html) {
      html = '<p class="empty">No saves found. Start a new game first.</p>';
      document.getElementById('btn-load-confirm').disabled = true;
    } else {
      document.getElementById('btn-load-confirm').disabled = false;
      // Add click handlers
      setTimeout(() => {
        document.querySelectorAll('#save-list .log-entry').forEach(el => {
          el.addEventListener('click', () => {
            document.querySelectorAll('#save-list .log-entry').forEach(e => e.style.background = '');
            el.style.background = 'var(--sur)';
            el.dataset.selected = 'true';
          });
        });
      }, 0);
    }
    listEl.innerHTML = html;
    statusEl.textContent = localSave ? 'Found saves below.' : 'No saves found.';
  } catch (e) {
    statusEl.textContent = `Error: ${e.message}`;
    console.error('[load modal]', e);
  }
});

document.getElementById('btn-load-cancel').addEventListener('click', () => {
  document.getElementById('load-modal').style.display = 'none';
});

document.getElementById('btn-load-confirm').addEventListener('click', async () => {
  const selected = document.querySelector('#save-list .log-entry[data-selected="true"]');
  if (!selected) { alert('Select a save first.'); return; }
  const source = selected.dataset.source;
  document.getElementById('load-modal').style.display = 'none';
  setStatus('Loading save...', 'load');
  lockInput(true);

  try {
    let ws;
    if (source === 'cloud') {
      ws = await loadWorldStateCloud();
    } else {
      ws = await loadWorldState();
    }
    if (!ws) throw new Error('Save not found');

    WS = ws;
    renderAll();
    // Load narrations with better error handling
    try {
      const saved = await loadNarrations(50);
      if (saved.length) {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        for (const n of saved) {
          const anch = renderTurnAnchor(n.turn, n.data?.simTime ?? n.timestamp, n.data?.location ?? '');
          renderNarration(n.description, anch, feed, n.turn);
        }
        feed.scrollTop = feed.scrollHeight;
        // Rebuild Grok conversation history
        const recent = saved.slice(-3);
        const history = [];
        for (const n of recent) {
          history.push({ role: 'user', content: `[turn ${n.turn} context restored]` });
          history.push({ role: 'assistant', content: n.description });
        }
        setConversationHistory(history);
        setStatus(`Loaded: Turn ${ws.turn} · ${ws.player.name}`);
      } else {
        document.getElementById('feed').innerHTML = '<div style="color:var(--dim);font-size:12px;padding:24px;text-align:center">Save loaded but no narrations found. Start playing to generate new content.</div>';
        setStatus(`Loaded: Turn ${ws.turn} · ${ws.player.name} (no narrations)`);
      }
    } catch (e) {
      console.error('[load narrations]', e);
      document.getElementById('feed').innerHTML = '<div style="color:var(--dim);font-size:12px;padding:24px;text-align:center">Save loaded but narrations failed to load. Check console for details.</div>';
      setStatus(`Loaded: Turn ${ws.turn} · ${ws.player.name} (narrations error)`);
    }
  } catch (e) {
    setStatus(`Load failed: ${e.message}`, 'err');
    console.error('[load save]', e);
  } finally {
    lockInput(false);
  }
});

document.getElementById('btn-login-link').addEventListener('click', async () => {
  const email  = document.getElementById('k-email').value.trim();
  const status = document.getElementById('auth-status');
  if (!email) { status.textContent = 'Enter an email first.'; return; }
  const sbu = localStorage.getItem('SUPABASE_URL');
  const sbk = localStorage.getItem('SUPABASE_ANON_KEY');
  if (!sbu || !sbk || !window.supabase) {
    status.textContent = 'Save Supabase URL + key first, then retry.';
    return;
  }
  if (!_sbClient) _sbClient = window.supabase.createClient(sbu, sbk);
  const redirectTo  = window.location.href.split('#')[0];
  const { error }   = await _sbClient.auth.signInWithOtp({ email, options: { emailRedirectTo: redirectTo } });
  status.textContent = error ? `Error: ${error.message}` : `Link sent to ${email} — check inbox.`;
});

boot();
